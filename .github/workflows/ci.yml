name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check (oxfmt)
        run: pnpm format:check

      - name: Lint (oxlint)
        run: pnpm lint

      - name: Secret check (secretlint)
        run: pnpm secretlint --secretlintrc .secretlintrc.json "**/*"

      - name: Test (vitest)
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Upload dist artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist
          path: dist/

  badge:
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@95815c38c0a4a5c36a0ce9a9ef85ceed65d98a2d # v4.2.1
        with:
          name: dist
          path: dist/

      - name: Generate dist size badge JSON
        run: |
          SIZE=$(du -sh dist/ | cut -f1)
          mkdir -p badges
          printf '{"schemaVersion":1,"label":"dist size","message":"%s","color":"5b8dee"}\n' "$SIZE" > badges/dist-size.json

      - name: Deploy badge to GitHub Pages
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108548d274e703c8c3d1edd # v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./badges
          destination_dir: badges
          keep_files: true

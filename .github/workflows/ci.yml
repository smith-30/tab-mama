name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check (oxfmt)
        run: pnpm format:check

      - name: Lint (oxlint)
        run: pnpm lint

      - name: Secret check (secretlint)
        run: pnpm secretlint --secretlintrc .secretlintrc.json "**/*"

      - name: Test (vitest)
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Upload dist artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/

  badge:
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Generate dist size badge JSON
        run: |
          BYTES=$(du -sb dist/ | cut -f1)
          KB=$(( BYTES / 1024 ))
          if [ "$KB" -ge 1024 ]; then
            SIZE="$(echo "scale=1; $KB / 1024" | bc) MB"
          else
            SIZE="${KB} KB"
          fi
          mkdir -p badges
          printf '{"schemaVersion":1,"label":"extensionSize","message":"%s","color":"5b8dee"}\n' "$SIZE" > badges/dist-size.json

      - name: Deploy badge to GitHub Pages
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./badges
          destination_dir: badges
          keep_files: true

repos:
  - repo: local
    hooks:
      - id: oxfmt
        name: oxfmt
        language: system
        entry: pnpm oxfmt --check
        files: \.(ts|tsx|js|jsx)$
        pass_filenames: true

      - id: oxlint
        name: oxlint
        language: system
        entry: pnpm oxlint
        files: \.(ts|tsx|js|jsx)$
        pass_filenames: true

      - id: actionlint
        name: actionlint
        language: system
        entry: actionlint
        files: ^\.github/workflows/.*\.ya?ml$
        pass_filenames: true

      - id: secretlint
        name: secretlint
        language: system
        entry: pnpm secretlint --secretlintrc .secretlintrc.json
        files: ""
        pass_filenames: false

      - id: test
        name: vitest
        language: system
        entry: pnpm test
        pass_filenames: false
